<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE v4</title>
<style>
/* ═════════════════════════════════════════════
   HIVE v4 — Vercel-Insipired Design
   ═════════════════════════════════════════════ */

/* ── Tokens ── */
:root {
  /* Surfaces — dark dashboard inversion of Vercel's light system */
  --canvas:        #000000;
  --canvas-soft:   #0a0a0a;
  --canvas-raised: #111111;
  --canvas-hover:  #1a1a1a;
  --canvas-inset:  #0d0d0d;

  /* Ink scale — from Vercel's gray‑1000 down to gray‑100 inverted */
  --ink:           #ededed;
  --ink-secondary: #888888;
  --ink-muted:     #555555;
  --ink-faint:     #333333;

  /* Hairlines — Vercel's #ebebeb inverted for dark */
  --hairline:      #1f1f1f;
  --hairline-strong:#2a2a2a;

  /* Accent — Vercel blue */
  --blue:          #0070f3;
  --blue-soft:     #0070f31a;
  --blue-deep:     #0761d1;

  /* Semantic */
  --green:         #50e3c2;
  --green-soft:    #50e3c21a;
  --red:           #ee0000;
  --red-soft:      #ee00001a;
  --amber:         #f5a623;
  --amber-soft:    #f5a6231a;
  --violet:        #7928ca;
  --violet-soft:   #7928ca1a;

  /* Typography — Geist system */
  --font-sans:  Geist, Inter, system-ui, -apple-system, sans-serif;
  --font-mono:  'Geist Mono', ui-monospace, 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;

  /* Type scale (Vercel‑derived) */
  --text-xs:   11px;
  --text-sm:   13px;
  --text-base: 14px;
  --text-lg:   16px;
  --text-xl:   20px;
  --text-2xl:  24px;

  /* Spacing — 8px grid */
  --space-0:   0px;
  --space-1:   4px;
  --space-2:   8px;
  --space-3:   12px;
  --space-4:   16px;
  --space-5:   20px;
  --space-6:   24px;
  --space-8:   32px;
  --space-10:  40px;
  --space-12:  48px;

  /* Radius — Vercel scale */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 100px;
  --radius-full: 9999px;

  /* Shadows — Vercel stacked shadow system */
  --shadow-card:
    0 0 0 1px #ffffff08 inset,
    0 1px 1px #00000005,
    0 2px 2px #0000000a;
  --shadow-elevated:
    0 0 0 1px #ffffff08 inset,
    0 2px 2px #0000000a,
    0 8px 8px -8px #0000000a;
  --shadow-modal:
    0 0 0 1px #ffffff08 inset,
    0 1px 1px #00000005,
    0 8px 16px -4px #0000000a,
    0 24px 32px -8px #0000000f;

  /* Sidebar */
  --sidebar-width: 260px;
}

/* ── Reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-sans);
  font-size:var(--text-base);
  color:var(--ink);
  background:var(--canvas-soft);
  display:flex;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
input,button,textarea{font-family:inherit}

/* ═══════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════ */
.sidebar{
  width:var(--sidebar-width);min-width:var(--sidebar-width);
  background:var(--canvas-raised);
  border-right:1px solid var(--hairline);
  display:flex;flex-direction:column;overflow:hidden;
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.main-header{
  height:52px;min-height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--space-6);
  border-bottom:1px solid var(--hairline);
  background:var(--canvas-raised);
}
.main-header .left{display:flex;align-items:center;gap:var(--space-3);min-width:0}
.main-header .left h2{
  font-size:var(--text-sm);font-weight:500;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.main-header .right{display:flex;align-items:center;gap:var(--space-2)}

.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ═══════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════ */
.sidebar-header{
  height:52px;min-height:52px;
  display:flex;align-items:center;gap:var(--space-3);
  padding:0 var(--space-4);
  border-bottom:1px solid var(--hairline);
}
.sidebar-header .logo{
  width:24px;height:24px;border-radius:var(--radius-sm);
  background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;
}
.sidebar-header .info{flex:1;min-width:0}
.sidebar-header .info h1{
  font-size:var(--text-sm);font-weight:500;color:var(--ink);
  line-height:1.2;
}
.sidebar-header .info .sub{
  font-size:var(--text-xs);color:var(--ink-muted);
  font-family:var(--font-mono);margin-top:1px;
}

.sidebar-tabs{
  display:flex;border-bottom:1px solid var(--hairline);
}
.sidebar-tab{
  flex:1;height:36px;
  display:flex;align-items:center;justify-content:center;
  font-size:var(--text-xs);font-weight:500;cursor:pointer;
  color:var(--ink-muted);background:transparent;border:none;
  border-bottom:2px solid transparent;
  transition:color .12s,border-color .12s;
}
.sidebar-tab:hover{color:var(--ink-secondary)}
.sidebar-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

.sidebar-panel{flex:1;overflow:hidden;display:none;flex-direction:column}
.sidebar-panel.active{display:flex}

/* Project search */
.project-search{padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--hairline)}
.project-search input{
  width:100%;height:32px;padding:0 var(--space-2);
  background:var(--canvas-inset);border:1px solid var(--hairline);
  border-radius:var(--radius-sm);color:var(--ink);font-size:var(--text-xs);
  outline:none;
}
.project-search input:focus{border-color:var(--blue)}
.project-search input::placeholder{color:var(--ink-faint)}

/* Project list */
.project-list{flex:1;overflow-y:auto;padding:var(--space-1) 0}
.project-item{
  display:flex;align-items:center;gap:var(--space-2);
  padding:var(--space-2) var(--space-3);cursor:pointer;
  border-left:2px solid transparent;
  transition:background .12s;
}
.project-item:hover{background:var(--canvas-hover)}
.project-item.active{
  background:var(--blue-soft);
  border-left-color:var(--blue);
}
.project-item .dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
}
.project-item .dot.running{background:var(--blue);animation:pulse 1.5s infinite}
.project-item .dot.done{background:var(--green)}
.project-item .dot.failed{background:var(--red)}
.project-item .dot.idle{background:var(--ink-faint)}
.project-item .dot.cancelled{background:var(--ink-muted)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.project-item .pinfo{flex:1;min-width:0}
.project-item .pname{font-size:var(--text-xs);font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-item .pmeta{font-size:11px;color:var(--ink-faint);margin-top:1px;font-family:var(--font-mono)}
.project-item .pstatus{
  font-size:10px;padding:1px 6px;border-radius:var(--radius-full);
  font-weight:500;flex-shrink:0;font-family:var(--font-mono);
}
.project-item .pstatus.running{background:var(--blue-soft);color:var(--blue)}
.project-item .pstatus.done{background:var(--green-soft);color:var(--green)}
.project-item .pstatus.failed{background:var(--red-soft);color:var(--red)}
.project-item .pstatus.idle{background:transparent;color:var(--ink-faint);border:1px solid var(--hairline)}

/* File tree (sidebar) */
.file-tree-panel{flex:1;overflow-y:auto;padding:var(--space-2) 0}
.file-tree-item{
  display:flex;align-items:center;gap:var(--space-1);
  padding:3px var(--space-2) 3px calc(8px + var(--level,0)*14px);
  font-size:var(--text-xs);cursor:pointer;
  color:var(--ink-secondary);border:none;background:none;
  width:100%;text-align:left;font-family:var(--font-mono);
}
.file-tree-item:hover{color:var(--ink);background:var(--canvas-hover)}
.file-tree-item .icon{width:14px;text-align:center;flex-shrink:0}
.file-tree-item.dir{color:var(--ink-secondary)}
.file-tree-item.dir.open{color:var(--blue)}
.file-tree-item .size{font-size:10px;color:var(--ink-faint);margin-left:auto;flex-shrink:0}

/* ═══════════════════════════════════════════════
   TAB BAR
   ═══════════════════════════════════════════════ */
.tab-bar{
  display:flex;border-bottom:1px solid var(--hairline);
  background:var(--canvas-soft);flex-shrink:0;padding:0 var(--space-2);
}
.tab-btn{
  height:36px;padding:0 var(--space-4);font-size:var(--text-xs);font-weight:500;
  cursor:pointer;color:var(--ink-muted);background:none;border:none;
  border-bottom:2px solid transparent;transition:all .12s;
  display:flex;align-items:center;gap:var(--space-1);
}
.tab-btn:hover{color:var(--ink-secondary)}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--blue)}
.tab-btn .badge{
  font-size:10px;padding:0 5px;border-radius:var(--radius-full);
  background:var(--canvas-raised);color:var(--ink-muted);
  font-family:var(--font-mono);
}

.tab-panel{flex:1;overflow:hidden;display:none}
.tab-panel.active{display:flex;flex-direction:column}

/* ═══════════════════════════════════════════════
   CONSOLE TAB
   ═══════════════════════════════════════════════ */
.console-layout{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:var(--space-6);gap:var(--space-6)}

/* Phase pipeline */
.pipeline{
  display:flex;align-items:center;
  padding:var(--space-3) 0;flex-shrink:0;
}
.pipe-node{
  display:flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:var(--radius-full);
  font-size:11px;font-weight:500;
  background:var(--canvas-inset);border:1px solid var(--hairline);
  color:var(--ink-faint);flex-shrink:0;position:relative;
  transition:all .2s;
}
.pipe-node.active{border-color:var(--blue);color:var(--blue);background:var(--blue-soft)}
.pipe-node.done{border-color:var(--green);color:var(--green);background:var(--green-soft)}
.pipe-node.fail{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.pipe-node .plabel{
  position:absolute;top:34px;font-size:9px;font-weight:400;
  white-space:nowrap;color:var(--ink-faint);font-family:var(--font-mono);
}
.pipe-node.active .plabel{color:var(--blue)}
.pipe-node.done .plabel{color:var(--green)}
.pipe-conn{width:20px;height:1px;background:var(--hairline-strong);flex-shrink:0}
.pipe-conn.done{background:var(--green)}
.pipe-conn.active{background:var(--blue)}

/* Stat cards */
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-2);flex-shrink:0;
}
.stat-card{
  background:var(--canvas-raised);border:1px solid var(--hairline);
  border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);box-shadow:var(--shadow-card);
}
.stat-card .slabel{
  font-size:10px;color:var(--ink-faint);font-family:var(--font-mono);
  text-transform:uppercase;letter-spacing:.4px;
}
.stat-card .svalue{
  font-size:var(--text-xl);font-weight:600;color:var(--ink);
  font-family:var(--font-mono);margin-top:var(--space-1);
}
.stat-card .svalue.green{color:var(--green)}
.stat-card .svalue.running{color:var(--blue)}
.stat-card .svalue.failed{color:var(--red)}

/* Terminal log */
.log-container{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:80px}
.log-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:var(--space-2) var(--space-3);
  background:var(--canvas-inset);
  border:1px solid var(--hairline);border-bottom:none;
  border-radius:var(--radius-sm) var(--radius-sm) 0 0;
}
.log-header .ltitle{
  font-size:10px;font-weight:500;color:var(--ink-muted);
  font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.4px;
}
.log-header .lclear{
  font-size:10px;color:var(--ink-faint);cursor:pointer;background:none;border:none;font-family:var(--font-mono);
}
.log-header .lclear:hover{color:var(--ink-secondary)}
.log-box{
  flex:1;overflow-y:auto;
  background:var(--canvas);border:1px solid var(--hairline);
  border-radius:0 0 var(--radius-sm) var(--radius-sm);
  padding:var(--space-3);font-family:var(--font-mono);font-size:var(--text-xs);line-height:1.6;
}
.log-entry{display:flex;gap:var(--space-2);padding:1px 0;color:var(--ink-muted)}
.log-entry .ltime{color:var(--ink-faint);flex-shrink:0}
.log-entry .lmsg{flex:1;word-break:break-all}
.log-entry.ok .lmsg{color:var(--green)}
.log-entry.err .lmsg{color:var(--red)}
.log-entry.info .lmsg{color:var(--ink-secondary)}
.log-entry.highlight .lmsg{color:var(--amber)}

/* Build input */
.build-input-row{
  display:flex;gap:var(--space-2);align-items:stretch;
  flex-shrink:0;
}
.build-input-row input{
  flex:1;height:40px;padding:0 var(--space-3);
  background:var(--canvas-raised);border:1px solid var(--hairline-strong);
  border-radius:var(--radius-sm);color:var(--ink);font-size:var(--text-sm);
  outline:none;font-family:var(--font-mono);
}
.build-input-row input:focus{border-color:var(--blue)}
.build-input-row input::placeholder{color:var(--ink-faint)}

.btn{
  display:inline-flex;align-items:center;gap:var(--space-1);
  height:32px;padding:0 var(--space-3);border-radius:var(--radius-sm);
  font-size:var(--text-xs);font-weight:500;cursor:pointer;
  border:none;transition:all .12s;
  white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:var(--blue);color:#fff;
  font-weight:500;box-shadow:var(--shadow-card);
}
.btn-primary:hover{background:var(--blue-deep)}
.btn-ghost{
  background:transparent;color:var(--ink-secondary);border:1px solid var(--hairline);
}
.btn-ghost:hover{background:var(--canvas-hover);color:var(--ink)}
.btn-danger{
  background:transparent;color:var(--red);border:1px solid var(--red-soft);
}
.btn-danger:hover{background:var(--red-soft)}
.btn-build{
  height:36px;padding:0 var(--space-5);border-radius:var(--radius-sm);
  background:var(--blue);color:#fff;font-size:var(--text-xs);font-weight:500;
  cursor:pointer;border:none;display:inline-flex;align-items:center;gap:var(--space-1);
  box-shadow:var(--shadow-card);
}
.btn-build:hover{background:var(--blue-deep)}

/* ═══════════════════════════════════════════════
   FILES TAB
   ═══════════════════════════════════════════════ */
.files-layout{flex:1;display:flex;overflow:hidden}
.files-sidebar{
  width:240px;min-width:240px;
  border-right:1px solid var(--hairline);
  display:flex;flex-direction:column;
  background:var(--canvas-soft);
}
.files-sidebar .ftitle{
  height:36px;display:flex;align-items:center;padding:0 var(--space-3);
  font-size:10px;font-weight:500;color:var(--ink-muted);
  font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.4px;
  border-bottom:1px solid var(--hairline);
}
.files-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.file-viewer{flex:1;overflow-y:auto;background:var(--canvas);min-height:0}
.file-viewer .fheader{
  height:36px;display:flex;align-items:center;gap:var(--space-2);
  padding:0 var(--space-4);border-bottom:1px solid var(--hairline);
  font-size:var(--text-xs);color:var(--ink-secondary);font-family:var(--font-mono);
  flex-shrink:0;
}
.file-viewer .fbody{
  padding:var(--space-4);font-family:var(--font-mono);font-size:var(--text-xs);
  line-height:1.6;color:var(--ink-secondary);white-space:pre-wrap;overflow-x:auto;
}
.file-viewer .empty{
  display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--ink-faint);font-size:var(--text-xs);font-family:var(--font-mono);
}

/* Upload zone */
.upload-zone{
  border:1px dashed var(--hairline-strong);border-radius:var(--radius-sm);
  text-align:center;cursor:pointer;padding:var(--space-4);
  transition:all .12s;
}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-soft)}
.upload-zone .uz-text{font-size:var(--text-xs);color:var(--ink-muted);font-family:var(--font-mono)}
.upload-zone .uz-text .key{color:var(--blue);font-weight:500}

/* Artifacts */
.artifact-grid{
  padding:var(--space-3);display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--space-2);
}
.artifact-card{
  background:var(--canvas-raised);border:1px solid var(--hairline);border-radius:var(--radius-md);
  padding:var(--space-3);cursor:pointer;transition:all .12s;
  box-shadow:var(--shadow-card);
}
.artifact-card:hover{border-color:var(--blue);box-shadow:var(--shadow-elevated)}
.artifact-card .aicon{font-size:18px;margin-bottom:var(--space-1)}
.artifact-card .aname{font-size:var(--text-sm);font-weight:500;color:var(--ink);font-family:var(--font-mono)}
.artifact-card .ameta{font-size:10px;color:var(--ink-faint);margin-top:2px}

/* ═══════════════════════════════════════════════
   BUILD MODAL
   ═══════════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.7);z-index:1000;
  align-items:center;justify-content:center;
}
.modal-box{
  background:var(--canvas-raised);border:1px solid var(--hairline-strong);
  border-radius:var(--radius-lg);padding:var(--space-6);
  width:500px;max-width:90vw;
  box-shadow:var(--shadow-modal);
}
.modal-title{
  font-size:var(--text-lg);font-weight:500;color:var(--ink);
  font-family:var(--font-mono);margin-bottom:var(--space-5);
}
.modal-body{display:flex;flex-direction:column;gap:var(--space-4)}
.modal-field{display:flex;flex-direction:column;gap:var(--space-1)}
.modal-field label{font-size:var(--text-xs);color:var(--ink-muted);font-family:var(--font-mono)}
.modal-field textarea{
  padding:var(--space-2) var(--space-3);background:var(--canvas-inset);
  border:1px solid var(--hairline);border-radius:var(--radius-sm);
  color:var(--ink);font-size:var(--text-sm);font-family:var(--font-mono);
  outline:none;resize:vertical;
}
.modal-field textarea:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:var(--space-2);justify-content:flex-end;margin-top:var(--space-2)}

/* ═══════════════════════════════════════════════
   SCROLLBAR
   ═══════════════════════════════════════════════ */
@media(hover:hover){
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--hairline-strong);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-faint)}
}

/* ═══════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════ */
@media(max-width:768px){
  .sidebar{width:100%;min-width:auto;max-height:160px;border-right:none;border-bottom:1px solid var(--hairline)}
  body{flex-direction:column}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .files-sidebar{width:100%;min-width:auto;max-height:160px}
  .files-layout{flex-direction:column}
}
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">H</div>
    <div class="info">
      <h1>HIVE</h1>
      <div class="sub">v4 · Multi-Agent Build</div>
    </div>
  </div>
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="projects" onclick="switchSidebarTab('projects')">Projects</button>
    <button class="sidebar-tab" data-tab="files" onclick="switchSidebarTab('files')">Files</button>
  </div>

  <div class="sidebar-panel active" id="sp-projects">
    <div class="project-search">
      <input type="text" id="projectFilter" placeholder="Search projects…" oninput="renderProjects()" />
    </div>
    <div class="project-list" id="projectList"></div>
  </div>

  <div class="sidebar-panel" id="sp-files">
    <div class="file-tree-panel" id="fileTree">
      <div style="padding:var(--space-6);text-align:center;color:var(--ink-faint);font-size:var(--text-xs);font-family:var(--font-mono)">Select a project to browse files</div>
    </div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div class="main">
  <div class="main-header">
    <div class="left">
      <span id="liveDot" style="width:7px;height:7px;border-radius:50%;background:var(--ink-faint);flex-shrink:0"></span>
      <h2 id="panelTitle">Console</h2>
    </div>
    <div class="right">
      <button class="btn btn-ghost" onclick="toggleLang()" style="font-size:10px;min-width:32px" id="langToggle"></button>
      <span id="panelActions">
        <button class="btn btn-primary" onclick="showBuildModal()" data-i18n="new_build">+ New Build</button>
      </span>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="console" onclick="switchTab('console')">Console</button>
    <button class="tab-btn" data-tab="files" onclick="switchTab('files')">Files</button>
    <button class="tab-btn" data-tab="artifacts" onclick="switchTab('artifacts')">Artifacts <span class="badge" id="artifactCount">0</span></button>
  </div>

  <div class="main-content">

    <!-- Console -->
    <div class="tab-panel active" id="tab-console">
      <div class="console-layout" id="consoleContent">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:var(--space-4);color:var(--ink-faint);font-family:var(--font-mono);font-size:var(--text-xs);">
          <div style="font-size:24px;opacity:.2">⬢</div>
          <div>Select a project or start a new build</div>
          <div class="build-input-row" style="width:100%;max-width:560px">
            <input type="text" id="buildInput" placeholder="Describe your requirements…" />
            <button class="btn-build" onclick="buildProject()">Build</button>
            <button class="btn btn-ghost" onclick="document.getElementById('fileUploadInput').click()">Upload</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Files -->
    <div class="tab-panel" id="tab-files">
      <div class="files-layout">
        <div class="files-sidebar">
          <div class="ftitle">Explorer</div>
          <div class="file-tree-panel" id="mainFileTree" style="flex:1;overflow-y:auto">
            <div style="padding:var(--space-6);text-align:center;color:var(--ink-faint);font-size:var(--text-xs)">Select a project to browse files</div>
          </div>
        </div>
        <div class="files-content">
          <div class="file-viewer" id="fileViewer">
            <div class="empty"><div>Click a file to preview</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Artifacts -->
    <div class="tab-panel" id="tab-artifacts">
      <div style="overflow-y:auto;flex:1">
        <div id="artifactContent">
          <div class="empty" style="padding:var(--space-12);text-align:center;color:var(--ink-faint);font-family:var(--font-mono);font-size:var(--text-xs)">
            <div style="font-size:24px;margin-bottom:var(--space-3);opacity:.2">📦</div>
            <div>No artifacts yet</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<input type="file" id="fileUploadInput" style="display:none" accept=".txt,.md,.json,.yaml,.yml,.py,.js,.ts" onchange="handleFileUpload(this.files)" />

<!-- Build modal -->
<div class="modal-overlay" id="buildModal" onclick="if(event.target===this)closeBuildModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">New Build</div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Requirements</label>
        <textarea id="modalBuildInput" rows="3" placeholder="Describe what you want to build…"></textarea>
      </div>
      <div class="modal-field">
        <label>Or upload a brief</label>
        <div class="upload-zone" id="modalUploadZone" onclick="document.getElementById('fileUploadInput').click()"
             ondragover="event.preventDefault();this.classList.add('upload-zone-hover')"
             ondragleave="this.classList.remove('upload-zone-hover')" ondrop="handleDrop(event)">
          <div class="uz-text">Drop a file or <span class="key">browse</span></div>
          <div style="font-size:10px;color:var(--ink-faint);margin-top:var(--space-1)">.txt .md .json .yaml .py</div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeBuildModal()">Cancel</button>
      <button class="btn btn-primary" onclick="buildFromModal()">Build</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════════════════
var _LANG = 'zh';
var urlLang = (new URLSearchParams(location.search)).get('lang');
if (urlLang === 'en') _LANG = 'en';
else if (urlLang === 'zh') _LANG = 'zh';
else _LANG = (navigator.language || '').startsWith('zh') ? 'zh' : 'en';
var _LOCALE = _LANG;

document.documentElement.lang = _LANG;

var _T = {
  'title':           {zh:'HIVE v4 控制台',    en:'HIVE v4 Console'},
  'subtitle':        {zh:'Multi-Agent Build', en:'Multi-Agent Build'},
  'projects':        {zh:'项目', en:'Projects'},
  'files':           {zh:'文件', en:'Files'},
  'console':         {zh:'控制台', en:'Console'},
  'artifacts':       {zh:'成品', en:'Artifacts'},
  'new_build':       {zh:'+ 新构建', en:'+ New Build'},
  'search':          {zh:'搜索项目...', en:'Search projects...'},
  'describe':        {zh:'描述你的需求...', en:'Describe your requirements...'},
  'build':           {zh:'构建', en:'Build'},
  'upload':          {zh:'上传', en:'Upload'},
  'clean':           {zh:'清理', en:'Clean'},
  'delete':          {zh:'删除', en:'Delete'},
  'cancel':          {zh:'取消', en:'Cancel'},
  'log':             {zh:'日志', en:'Log'},
  'clear':           {zh:'清除', en:'Clear'},
  'select_hint':     {zh:'选择一个项目查看构建状态', en:'Select a project'},
  'no_projects':     {zh:'暂无项目', en:'No projects'},
  'no_matches':      {zh:'无匹配项目', en:'No matches'},
  'no_artifacts':    {zh:'暂无成品文件', en:'No artifacts'},
  'click_to_preview':{zh:'点击左侧文件查看内容', en:'Click a file to preview'},
  'browse_files':    {zh:'选择项目后浏览文件', en:'Select a project to browse files'},
  'start_build':     {zh:'开始新构建', en:'Start a new build'},
  'requirements':    {zh:'需求描述', en:'Requirements'},
  'or_upload':       {zh:'或上传需求文档', en:'Or upload a brief'},
  'drop_file':       {zh:'拖放文件到这里，或', en:'Drop a file or'},
  'browse':          {zh:'点击上传', en:'browse'},
  'description':     {zh:'描述你的需求...', en:'Describe your requirements...'},
  'new_project':     {zh:'新项目', en:'New project'},
  'running':         {zh:'运行中', en:'Running'},
  'done':            {zh:'完成', en:'Done'},
  'failed':          {zh:'失败', en:'Failed'},
  'idle':            {zh:'空闲', en:'Idle'},
  'cancelled':       {zh:'已取消', en:'Cancelled'},
  'deleted':         {zh:'已删除', en:'Deleted'},
  'confirm_delete':  {zh:'确认删除项目', en:'Delete project'},
  'confirm_clean':   {zh:'确认清理工作区的临时文件（__pycache__、.pyc）？源码不受影响。', en:'Clean temporary files (__pycache__, .pyc)? Source code is not affected.'},
  'no_artifacts_desc':{zh:'成品会在构建完成后出现在工作区中', en:'Artifacts appear here after a build completes'},
};

function __(key) { return (_T[key] && _T[key][_LOCALE]) || key; }

function toggleLang() {
  var next = _LOCALE === 'zh' ? 'en' : 'zh';
  var url = new URL(location.href);
  url.searchParams.set('lang', next);
  location.href = url.toString();
}

// Apply i18n to static HTML elements
document.querySelectorAll('[data-i18n]').forEach(function(el){
  var key = el.getAttribute('data-i18n');
  if (_T[key]) el.textContent = __(key);
});
document.getElementById('langToggle').textContent = _LOCALE === 'zh' ? 'EN' : '中';

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let projects = [];
let currentSessionId = null;
let currentProjectName = null;
let pollTimer = null;
let logEntries = [];
let fileTreeData = [];

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function api(url) {
  try {
    const r = await fetch(url, {cache:'no-store'});
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}
async function apiPost(url, body) {
  try {
    const r = await fetch(url, {method:'POST', body, cache:'no-store'});
    return await r.json();
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function switchSidebarTab(tab) {
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.toggle('active', p.id === 'sp-' + tab));
  if (tab === 'files' && currentSessionId) loadFileTree();
}
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  if (tab === 'files' && currentSessionId) loadFileTree();
  if (tab === 'artifacts' && currentSessionId) loadArtifacts();
}

// ═══════════════════════════════════════════════════════════
// PROJECT LIST
// ═══════════════════════════════════════════════════════════
async function refreshProjects() {
  const data = await api('/api/projects');
  if (data) projects = data.projects || [];
  renderProjects();
}
function getStatusInfo(p) {
  const s = (p.state || p.status || 'idle').toLowerCase();
  if (['translating','planning','executing','testing','running','reviewing'].includes(s)) return {cls:'running', label:'Running'};
  if (['done','completed'].includes(s)) return {cls:'done', label:'Done'};
  if (['failed','error'].includes(s)) return {cls:'failed', label:'Failed'};
  if (s === 'cancelled') return {cls:'cancelled', label:'Cancelled'};
  if (s === 'deleted') return {cls:'idle', label:'Deleted'};
  return {cls:'idle', label:'Idle'};
}
function renderProjects() {
  const el = document.getElementById('projectList');
  const filter = (document.getElementById('projectFilter')?.value || '').toLowerCase();
  let list = projects;
  if (filter) list = list.filter(p => p.name.toLowerCase().includes(filter));
  if (!list.length) {
    el.innerHTML = `<div style="padding:var(--space-8);text-align:center;color:var(--ink-faint);font-size:var(--text-xs);font-family:var(--font-mono)">${filter ? 'No matches' : 'No projects'}</div>`;
    return;
  }
  el.innerHTML = list.map(p => {
    const si = getStatusInfo(p);
    const active = p.session_id === currentSessionId ? ' active' : '';
    const lastTime = p.last_activity ? new Date(p.last_activity).toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '';
    return '<div class="project-item' + active + '" onclick="selectProject(\'' + p.session_id + '\',\'' + p.name.replace(/'/g,"\\'") + '\')">' +
      '<div class="dot ' + si.cls + '"></div>' +
      '<div class="pinfo"><div class="pname">' + escapeHtml(p.name) + '</div>' +
      '<div class="pmeta">v' + (p.version_count||0) + ' · ' + lastTime + ' · $' + (p.total_cost_usd||0).toFixed(2) + '</div></div>' +
      '<div class="pstatus ' + si.cls + '">' + si.label + '</div></div>';
  }).join('');
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;')}

// ═══════════════════════════════════════════════════════════
// SELECT PROJECT
// ═══════════════════════════════════════════════════════════
async function selectProject(sessionId, name) {
  currentSessionId = sessionId;
  currentProjectName = name;
  renderProjects();
  document.getElementById('panelTitle').textContent = name || 'Console';
  const session = await api('/api/session/' + sessionId);
  if (!session || session.error) {
    document.getElementById('liveDot').style.background = 'var(--ink-faint)';
    showEmpty();
    return;
  }
  switchTab('console');
  renderConsole(session);
  loadFileTree();
  loadArtifacts();
  loadWorkspaceInfo();
}

// ═══════════════════════════════════════════════════════════
// CONSOLE
// ═══════════════════════════════════════════════════════════
const PHASES = ['idle','translating','planning','executing','testing','done'];
const PHASE_LABELS = ['Idle','Translate','Plan','Execute','Test','Done'];

function renderConsole(session) {
  const state = session.state || 'idle';
  const status = session.status || 'idle';
  const ver = session.current_version || 0;
  const cost = session.total_cost_usd || 0;
  const err = session.error_message || '';
  const isRunning = !['idle','done','cancelled','failed','deleted'].includes(state);

  const dot = document.getElementById('liveDot');
  dot.style.background = isRunning ? 'var(--blue)' : state === 'done' ? 'var(--green)' : state === 'failed' ? 'var(--red)' : 'var(--ink-faint)';

  let idx = PHASES.indexOf(state);
  if (idx === -1) idx = 0;
  let pipeHtml = PHASES.map((p,i)=>{
    let cls = 'pipe-node';
    if (i < idx) cls += ' done';
    else if (i === idx && isRunning && state !== 'failed') cls += ' active';
    else if (state === 'failed' && ['idle','translating','planning','executing','testing'].includes(state) && i === idx) cls += ' fail';
    const icon = i < idx ? '✓' : i === idx && isRunning ? '⟳' : i === idx && state === 'failed' ? '✗' : '○';
    const conn = i > 0 ? '<div class="pipe-conn' + (i <= idx ? ' done' : '') + '"></div>' : '';
    return conn + '<div class="' + cls + '">' + icon + '<span class="plabel">' + PHASE_LABELS[i] + '</span></div>';
  }).join('');

  const pct = Math.round(idx / (PHASES.length-1) * 100);
  const statusLabel = status === 'done' || state === 'done' ? 'Done' :
    status === 'failed' ? 'Failed' : status === 'cancelled' ? 'Cancelled' : isRunning ? 'Running' : 'Idle';
  const statusCls = status === 'done' || state === 'done' ? 'green' : status === 'failed' ? 'failed' : isRunning ? 'running' : '';

  document.getElementById('panelActions').innerHTML =
    '<button class="btn btn-primary" onclick="showBuildModal()">+ New Build</button>' +
    '<button class="btn btn-ghost" onclick="document.getElementById(\'fileUploadInput\').click()" style="font-size:10px">Upload</button>' +
    '<button class="btn btn-ghost" onclick="cleanWorkspace()" style="font-size:10px">Clean</button>' +
    '<button class="btn btn-danger" onclick="deleteProject()" style="font-size:10px">Delete</button>';

  addLog(isRunning && status !== 'failed' ? 'info' : state === 'done' ? 'ok' : 'err',
    'Status: ' + state + ' / ' + status + ' | v' + (ver||1));

  const logEl = document.getElementById('consoleContent');
  logEl.innerHTML =
    (err ? '<div style="background:var(--red-soft);border:1px solid var(--red-soft);border-radius:var(--radius-sm);padding:var(--space-2) var(--space-3);font-size:var(--text-xs);color:var(--red);font-family:var(--font-mono)">' + escapeHtml(err) + '</div>' : '') +
    '<div class="pipeline">' + pipeHtml + '</div>' +
    '<div class="stats-grid">' +
      '<div class="stat-card"><div class="slabel">Status</div><div class="svalue ' + statusCls + '">' + statusLabel + '</div></div>' +
      '<div class="stat-card"><div class="slabel">Version</div><div class="svalue">v' + (ver||1) + '</div></div>' +
      '<div class="stat-card"><div class="slabel">Progress</div><div class="svalue running">' + pct + '%</div></div>' +
      '<div class="stat-card"><div class="slabel">Cost</div><div class="svalue">$' + cost.toFixed(2) + '</div></div>' +
    '</div>' +
    '<div class="log-container">' +
      '<div class="log-header"><div class="ltitle">Log</div><button class="lclear" onclick="clearLogs()">Clear</button></div>' +
      '<div class="log-box" id="logBox"></div>' +
    '</div>' +
    '<div class="build-input-row">' +
      '<input type="text" id="buildInput" placeholder="Describe changes for iteration…" />' +
      '<button class="btn-build" onclick="buildProject()">Build</button>' +
      '<button class="btn btn-ghost" onclick="document.getElementById(\'fileUploadInput\').click()">Upload</button>' +
    '</div>';
  renderLogs();
}

function showEmpty(msg) {
  document.getElementById('consoleContent').innerHTML =
    '<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:var(--space-4);color:var(--ink-faint);font-family:var(--font-mono);font-size:var(--text-xs)">' +
    '<div style="font-size:24px;opacity:.2">⬢</div><div>' + (msg || 'Select a project') + '</div></div>';
}

// ═══════════════════════════════════════════════════════════
// LOGS
// ═══════════════════════════════════════════════════════════
function addLog(level, msg) {
  const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  logEntries.push({level, msg, time});
  renderLogs();
}
function clearLogs() { logEntries = []; renderLogs(); }
function renderLogs() {
  const box = document.getElementById('logBox');
  if (!box) return;
  if (!logEntries.length) {
    box.innerHTML = '<div class="log-entry info"><span class="ltime">[--:--:--]</span><span class="lmsg">System ready</span></div>';
    return;
  }
  box.innerHTML = logEntries.map(l =>
    '<div class="log-entry ' + l.level + '"><span class="ltime">[' + l.time + ']</span><span class="lmsg">' + escapeHtml(l.msg) + '</span></div>'
  ).join('');
  box.scrollTop = box.scrollHeight;
}

// ═══════════════════════════════════════════════════════════
// BUILD
// ═══════════════════════════════════════════════════════════
function showBuildModal() { document.getElementById('buildModal').style.display = 'flex'; }
function closeBuildModal() { document.getElementById('buildModal').style.display = 'none'; }
async function buildFromModal() {
  const input = document.getElementById('modalBuildInput');
  const desc = input.value.trim();
  if (!desc) return;
  closeBuildModal();
  await doBuild(desc);
}
async function buildProject() {
  const input = document.getElementById('buildInput');
  const desc = input ? input.value.trim() : '';
  if (!desc) { showBuildModal(); return; }
  await doBuild(desc);
  if (input) input.value = '';
}
async function doBuild(desc) {
  addLog('info', 'Starting build: "' + desc.substring(0,80) + (desc.length>80?'…':'') + '"');
  const result = await api('/api/build?description=' + encodeURIComponent(desc) + '&lang=' + _LOCALE);
  if (result && result.status === 'started') {
    addLog('ok', 'Build started (session: ' + result.session_id + ')');
    refreshProjects();
    if (result.session_id) {
      currentSessionId = result.session_id;
      currentProjectName = result.project_name;
      setTimeout(function(){ selectProject(result.session_id, result.project_name); }, 800);
    }
  } else {
    addLog('err', 'Failed: ' + (result?.message || 'unknown'));
  }
}

// ═══════════════════════════════════════════════════════════
// FILE UPLOAD
// ═══════════════════════════════════════════════════════════
function handleFileUpload(files) {
  if (!files || !files.length) return;
  const file = files[0];
  addLog('info', 'Uploading: ' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)');
  closeBuildModal();
  const fd = new FormData();
  fd.append('file', file);
  apiPost('/api/upload', fd).then(function(result){
    if (result && result.status === 'started') {
      addLog('ok', 'Build from "' + file.name + '" started');
      refreshProjects();
      if (result.session_id) {
        currentSessionId = result.session_id;
        currentProjectName = result.project_name;
        setTimeout(function(){ selectProject(result.session_id, result.project_name); }, 800);
      }
    } else {
      addLog('err', 'Upload failed: ' + (result?.message || 'unknown'));
    }
  });
}
function handleDrop(e) {
  e.preventDefault();
  if (e.dataTransfer.files.length) handleFileUpload(e.dataTransfer.files);
}

// ═══════════════════════════════════════════════════════════
// FILE TREE
// ═══════════════════════════════════════════════════════════
async function loadFileTree() {
  if (!currentSessionId) return;
  const data = await api('/api/tree?session_id=' + currentSessionId);
  if (!data || !data.tree) return;
  fileTreeData = data.tree;
  document.getElementById('fileTree').innerHTML = renderTreeItems(data.tree, 0, 'sp');
  document.getElementById('mainFileTree').innerHTML = renderTreeItems(data.tree, 0, 'main');
}
function renderTreeItems(items, level, prefix, parentPath) {
  if (!items || !items.length) return '<div style="padding:var(--space-6);text-align:center;color:var(--ink-faint);font-size:var(--text-xs)">(empty)</div>';
  parentPath = parentPath || '';
  return items.map(function(item, i) {
    const id = prefix + '-' + level + '-' + i;
    const isDir = item.type === 'dir';
    const icon = isDir ? '📁' : item.ext === '.py' ? '🐍' : item.ext === '.json' ? '{}' : item.ext === '.exe' ? '⬡' : item.ext === '.dart' ? '🎯' : '📄';
    const size = item.size ? ' <span class="size">' + (item.size > 1024 ? (item.size/1024).toFixed(1)+'KB' : item.size+'B') + '</span>' : '';
    const expand = isDir && item.children ? '<span style="margin-left:auto;font-size:9px;color:var(--ink-faint)">' + item.children.length + '</span>' : '';
    if (isDir && item.name === '__pycache__') return '';
    const fp = parentPath ? parentPath + '/' + item.name : item.name;
    if (isDir) {
      return '<div><div class="file-tree-item dir" style="--level:' + level + '" onclick="toggleDir(\'' + id + '\')">' +
        '<span class="icon">' + icon + '</span> ' + item.name + expand + '</div>' +
        '<div id="' + id + '" style="display:none">' + (item.children ? renderTreeItems(item.children, level+1, prefix, fp) : '') + '</div></div>';
    }
    return '<div class="file-tree-item" style="--level:' + level + '" onclick="openFile(\'' + fp.replace(/'/g,"\\'") + '\')">' +
      '<span class="icon">' + icon + '</span> ' + item.name + size + '</div>';
  }).join('');
}
function toggleDir(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = el.style.display !== 'none' ? 'none' : 'block';
}

async function openFile(pathName) {
  if (!currentSessionId || !pathName) return;
  addLog('info', 'Opening: ' + pathName);
  const data = await api('/api/read?session_id=' + currentSessionId + '&path=' + encodeURIComponent(pathName) + '&limit=5000');
  const viewer = document.getElementById('fileViewer');
  if (data && data.data) {
    const lines = data.data.total_lines || 0;
    const content = data.data.content || '';
    viewer.innerHTML =
      '<div class="fheader"><span style="color:var(--ink-secondary)">📄</span> ' + escapeHtml(pathName) +
      '<span style="margin-left:auto;color:var(--ink-faint);font-size:10px;font-family:var(--font-mono)">' + lines + ' lines · ' + ((data.data.file_size||0) > 1024 ? (data.data.file_size/1024).toFixed(1)+'KB' : (data.data.file_size||0)+'B') + '</span></div>' +
      '<div class="fbody">' + escapeHtml(content) + '</div>';
  } else {
    viewer.innerHTML = '<div class="fheader"><span style="color:var(--red)">✗</span> ' + escapeHtml(pathName) + '</div>' +
      '<div class="fbody" style="color:var(--red)">Cannot read file</div>';
  }
  switchTab('files');
}

// ═══════════════════════════════════════════════════════════
// ARTIFACTS
// ═══════════════════════════════════════════════════════════
async function loadArtifacts() {
  if (!currentSessionId) return;
  const data = await api('/api/artifact?session_id=' + currentSessionId);
  const artifacts = data?.data?.artifacts || [];
  document.getElementById('artifactCount').textContent = artifacts.length || '0';
  const el = document.getElementById('artifactContent');
  if (!artifacts.length) {
    el.innerHTML = '<div style="padding:var(--space-12);text-align:center;color:var(--ink-faint);font-family:var(--font-mono);font-size:var(--text-xs)"><div style="font-size:24px;margin-bottom:var(--space-3);opacity:.2">📦</div><div>No artifacts</div></div>';
    return;
  }
  const icons = {'.exe':'⬡','.apk':'📱','.dmg':'⬟','.tar':'📦','.zip':'📦','.aab':'📱','.py':'🐍','.json':'{}','.txt':'📄','.yaml':'⚙','.yml':'⚙','.md':'📝','.dart':'🎯'};
  el.innerHTML = '<div class="artifact-grid">' + artifacts.map(function(a) {
    const icon = icons[a.type] || '📄';
    const size = a.size > 1048576 ? (a.size/1048576).toFixed(1)+'MB' : a.size > 1024 ? (a.size/1024).toFixed(1)+'KB' : a.size+'B';
    var parts = a.path.split(/[/\\]/);
    var idx = parts.indexOf('builds');
    var relPath = idx >= 0 ? parts.slice(idx+2).join('/') : parts.slice(-1)[0];
    return '<div class="artifact-card" onclick="openFile(\'' + relPath.replace(/'/g,"\\'") + '\')">' +
      '<div class="aicon">' + icon + '</div>' +
      '<div class="aname">' + escapeHtml(a.name) + '</div>' +
      '<div class="ameta">' + (a.type || '') + ' · ' + size + '</div>' +
      '<div style="font-size:10px;color:var(--ink-faint);margin-top:2px;font-family:var(--font-mono)">' + escapeHtml(relPath) + '</div></div>';
  }).join('') + '</div>';
}

// ═══════════════════════════════════════════════════════════
// WORKSPACE & CLEANUP
// ═══════════════════════════════════════════════════════════
async function loadWorkspaceInfo() {
  if (!currentSessionId) return;
  const data = await api('/api/workspace?session_id=' + currentSessionId);
  if (data) addLog('info', '[workspace] ' + data.path + ' | ' + data.total_files + ' files · ' + data.total_size_str);
}
async function cleanWorkspace() {
  if (!currentSessionId) return;
  if (!confirm('Clean temporary files (__pycache__, .pyc)? Source code is not affected.')) return;
  const dry = await api('/api/clean?session_id=' + currentSessionId + '&action=dry_run');
  if (!dry) { addLog('err', 'Clean check failed'); return; }
  if (dry.dirs_removed === 0 && dry.files_removed === 0) { addLog('info', 'Nothing to clean'); return; }
  addLog('highlight', 'Will remove ' + dry.dirs_removed + ' dirs + ' + dry.files_removed + ' files, free ' + dry.freed_str);
  const result = await api('/api/clean?session_id=' + currentSessionId + '&action=execute');
  if (result) {
    addLog('ok', 'Cleaned: removed ' + result.dirs_removed + ' dirs, ' + result.files_removed + ' files, freed ' + result.freed_str);
    loadFileTree();
  }
}

// ═══════════════════════════════════════════════════════════
// DELETE
// ═══════════════════════════════════════════════════════════
async function deleteProject() {
  if (!currentProjectName) return;
  if (!confirm('Delete project "' + currentProjectName + '"?')) return;
  const result = await api('/api/delete/' + encodeURIComponent(currentProjectName));
  if (result?.status === 'ok') {
    addLog('ok', 'Deleted "' + currentProjectName + '"');
    currentSessionId = null;
    currentProjectName = null;
    document.getElementById('panelTitle').textContent = 'Console';
    document.getElementById('panelActions').innerHTML = '<button class="btn btn-primary" onclick="showBuildModal()">+ New Build</button>';
    document.getElementById('liveDot').style.background = 'var(--ink-faint)';
    showEmpty();
    refreshProjects();
  }
}

// ═══════════════════════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════════════════════
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async function(){
    await refreshProjects();
    if (currentSessionId) {
      const data = await api('/api/session/' + currentSessionId);
      if (data && !data.error) renderConsole(data);
    }
  }, 3000);
}
startPolling();

// ═══════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = function(){ addLog('ok', 'WebSocket connected'); };
  ws.onmessage = function(e){
    try {
      const data = JSON.parse(e.data);
      const ev = data.event || '';
      addLog('highlight', 'Event: ' + ev);
      refreshProjects();
      if (currentSessionId && data.session_id === currentSessionId) {
        api('/api/session/' + currentSessionId).then(function(s){ if (s) renderConsole(s); });
        if (ev === 'file_ready' || ev === 'build_end') loadFileTree();
        if (ev === 'build_end') loadArtifacts();
      }
    } catch(e){}
  };
  ws.onclose = function(){ setTimeout(connectWS, 3000); };
  ws.onerror = function(){ ws.close(); };
}
connectWS();

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
addLog('info', 'HIVE v4 ready');
addLog('ok', 'System online');
refreshProjects();
</script>
