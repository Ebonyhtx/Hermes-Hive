name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run python -c "import ast, sys; sys.exit(0 if all(ast.parse(open(f).read()) for f in __import__('glob').glob('orchestrator/**/*.py', recursive=True) if '__pycache__' not in f) else 1)"
      - name: Test (unit)
        run: uv run python tests/test_unit.py
      - name: Test (edge)
        run: uv run python tests/test_edge.py
